# ============================================================
#  BAOZI STORE - Configuração do Banco de Dados
# ============================================================

# ---- H2 (banco em memória - pronto para usar sem instalar nada) ----
spring.datasource.url=jdbc:h2:mem:baozidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 (acesse: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- MySQL (comente o bloco H2 acima e descomente este para usar MySQL) ----
# spring.datasource.url=jdbc:mysql://localhost:3306/baozidb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=sua_senha
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Servidor ----
server.port=8080
